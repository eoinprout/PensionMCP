
name: WF_UnitTestMCP
env:
  DOTNET_VERSION: 10.0.x
on:
  push:
    branches: [ "main", "EoinAction1" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  unit-test:
    uses: ./.github/workflows/reusable/unittests.yml
  
  JobBuildExe:
    runs-on: ubuntu-latest
    needs: JobUnitTestPensionMCP
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{env.DOTNET_VERSION}}
      - name: Build Windows PensionMCP EXE
        run: dotnet publish ./PensionMCP/PensionMCP.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish
