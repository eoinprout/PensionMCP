
name: WF_UnitTestMCP
env:
  DOTNET_VERSION: 10.0.x
on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "EoinPerm*" ]
      
  workflow_dispatch:

permissions: {}


jobs:
  job-unit-test:
    uses: ./.github/workflows/reusable-unittests.yml
  
  job-build-windows-exe:
    needs: job-unit-test
    uses: ./.github/workflows/reusable-build-windows-exe.yml

  job-lint:
    needs: job-build-windows-exe
    uses: ./.github/workflows/reusable-lint.yml

  