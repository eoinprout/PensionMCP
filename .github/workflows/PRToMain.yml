
name: WF_UnitTestMCP
env:
  DOTNET_VERSION: 10.0.x
on:
  push:
    branches: [ "main", "EoinAction1" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  JobBuildExe:
    runs-on: ubuntu-latest
    needs: JobUnitTestPensionMCP
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{env.DOTNET_VERSION}}
      - name: Build Windows PensionMCP EXE
        run: dotnet publish ./PensionMCP/PensionMCP.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

  JobUnitTestPensionMCP: 
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup .NET
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: ${{env.DOTNET_VERSION}}
    - name: Build
      working-directory: TestPensionMCP
      run: dotnet build
    - name: Test with Code Coverage
      working-directory: TestPensionMCP
      run: dotnet test --verbosity normal  /p:CollectCoverage=true /p:Threshold=80 /p:ThresholdType=line /p:ThresholdStat=total
