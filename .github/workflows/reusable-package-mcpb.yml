name: Build Windows MCPB Installer

on:
  push:
    #branches: [ "EoinAction*" ]
    tags:
      - 'v*'

permissions:
  contents: write

## see  https://github.com/NimbleBrainInc/mcpb-pack for instructions
jobs:
  job-build-exe:
    uses: ./.github/workflows/reusable-build-windows-exe.yml

  job-pack-mcpb:
    runs-on: ubuntu-latest
    needs: job-build-exe
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download built EXE
        uses: actions/download-artifact@v8.0.1
        with:
          name: PensionMCP.exe.zip
          path: ./mcpb/server

      - uses: NimbleBrainInc/mcpb-pack@v3
        with:
          directory: mcpb
          upload: false # Nimble Brain publishes to mpak.dev, Prefer Offical MCP repo.
          announce: false

      - name: Upload MCPB Installer
        uses: actions/upload-artifact@v7.0.1             
        with:
          archive: false 
          name: eoinprout-PensionMCP-0.0.1.mcpb
          path: /home/runner/work/PensionMCP/PensionMCP/mcpb/eoinprout-PensionMCP-0.0.1.mcpb

      - name: Upload MCPB to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./mcpb/*.mcpb
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true
      

        