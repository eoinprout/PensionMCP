name: Build Windows MCPB Installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

## see  https://github.com/NimbleBrainInc/mcpb-pack for instructions
jobs:
  job-build-exe:
    uses: ./.github/workflows/reusable-build-windows-exe.yml

  job-sbom:
    uses: ./.github/workflows/reusable-sbom.yml

  job-pack-mcpb:
    runs-on: ubuntu-latest
    needs: [job-build-exe, job-sbom]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download built EXE
        uses: actions/download-artifact@v8.0.1
        with:
          name: PensionMCP.exe.zip
          path: ./mcpb/server

      - name: Download SBOM
        uses: actions/download-artifact@v8.0.1
        with:
          name: bom.xml
          path: ./sbom

      # using commit SHA rather than v3.0.0 tag, for security.
      - uses: NimbleBrainInc/mcpb-pack@e74c82722fa4b954ce7740f875d6c437ae471df6 
        with:
          directory: mcpb
          upload: false # Nimble Brain publishes to mpak.dev, Prefer Github releases
          announce: false

      #- name: Upload MCPB Installer
      #  uses: actions/upload-artifact@v7.0.1             
      #  with:
      #    archive: false 
      #    name: eoinprout-PensionMCP-0.0.1.mcpb
      #    path: /home/runner/work/PensionMCP/PensionMCP/mcpb/eoinprout-PensionMCP-0.0.1.mcpb

      
      - name: Upload MCPB to GitHub Release
        # https://github.com/svenstaro/upload-release-action
        # V2.11.5 using SHA rather than tag for security
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./mcpb/*.mcpb
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true

      - name: Upload SBOM to GitHub Release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2.11.5
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./sbom/bom.xml
          tag: ${{ github.ref }}
          overwrite: true
      

        